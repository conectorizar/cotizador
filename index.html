<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cotiz CTZ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #1a6dad;
    --blue-dark: #145a91;
    --blue-light: #e8f2fb;
    --yellow: #fff8e1;
    --yellow-border: #f0c830;
    --gray: #f5f6f8;
    --gray2: #e8eaed;
    --text: #1a1a2e;
    --text2: #555;
    --red: #d63031;
    --green: #00897b;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(26,109,173,0.10);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: var(--blue);
    color: white;
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  header .logo-dot { color: #7ecfff; }
  header .sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }

  .container { max-width: 520px; margin: 0 auto; padding: 16px; }

  .card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--blue);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title span { font-size: 16px; }

  label { font-size: 13px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 5px; }

  input, select {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--gray2);
    border-radius: 8px;
    font-size: 15px;
    color: var(--text);
    background: var(--gray);
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--blue);
    background: white;
  }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }

  /* TC + condición */
  .tc-row { display: flex; gap: 10px; align-items: flex-end; }
  .tc-row .field { flex: 1; margin-bottom: 0; }
  .tc-badge {
    background: var(--blue-light);
    color: var(--blue);
    font-size: 12px;
    font-weight: 700;
    padding: 11px 12px;
    border-radius: 8px;
    white-space: nowrap;
  }

  /* Buscador producto */
  .search-wrap { position: relative; }
  .search-wrap input { padding-left: 36px; }
  .search-icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 16px; pointer-events: none;
  }
  .dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: white;
    border: 1.5px solid var(--blue);
    border-radius: 8px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    display: none;
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 11px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--gray2);
    transition: background 0.15s;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.active { background: var(--blue-light); }
  .dropdown-item .item-code { font-size: 11px; font-weight: 700; color: var(--blue); }
  .dropdown-item .item-desc { font-size: 13px; color: var(--text); margin-top: 2px; line-height: 1.3; }
  .dropdown-item .item-price { font-size: 12px; color: var(--green); font-weight: 600; margin-top: 2px; }

  /* Agregar item */
  .add-row { display: grid; grid-template-columns: 1fr 80px; gap: 10px; margin-top: 12px; }
  .selected-product {
    background: var(--blue-light);
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 8px;
    display: none;
  }
  .selected-product.show { display: block; }
  .selected-product .sp-code { font-size: 11px; font-weight: 700; color: var(--blue); }
  .selected-product .sp-desc { font-size: 13px; color: var(--text); margin-top: 2px; }
  .selected-product .sp-price { font-size: 13px; color: var(--green); font-weight: 600; margin-top: 3px; }

  .btn {
    padding: 12px 18px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: var(--blue); color: white; width: 100%; margin-top: 12px; padding: 14px; font-size: 16px; border-radius: 10px; }
  .btn-primary:active { background: var(--blue-dark); transform: scale(0.98); }
  .btn-add { background: var(--blue); color: white; }
  .btn-add:active { background: var(--blue-dark); }
  .btn-danger { background: #fff0f0; color: var(--red); border: 1px solid #ffc8c8; padding: 6px 10px; font-size: 13px; border-radius: 6px; }

  /* Lista items */
  .items-list { display: flex; flex-direction: column; gap: 10px; }
  .item-card {
    background: var(--gray);
    border-radius: 10px;
    padding: 13px 14px;
    border-left: 3px solid var(--blue);
  }
  .item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .item-code { font-size: 11px; font-weight: 700; color: var(--blue); }
  .item-desc { font-size: 13px; color: var(--text); margin-top: 3px; line-height: 1.35; }
  .item-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .item-detail { font-size: 12px; color: var(--text2); }
  .item-total { font-size: 14px; font-weight: 700; color: var(--text); }

  .empty-items {
    text-align: center;
    padding: 30px 20px;
    color: var(--text2);
    font-size: 14px;
  }
  .empty-items .emoji { font-size: 32px; display: block; margin-bottom: 8px; }

  /* Totales */
  .totals-box { background: var(--gray); border-radius: 10px; overflow: hidden; }
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 14px;
    border-bottom: 1px solid var(--gray2);
    font-size: 14px;
  }
  .total-row:last-child { border-bottom: none; }
  .total-row.highlight {
    background: var(--yellow);
    border-top: 2px solid var(--yellow-border);
    font-weight: 700;
    font-size: 16px;
  }
  .total-label { color: var(--text2); }
  .total-value { font-weight: 600; color: var(--text); }
  .highlight .total-label, .highlight .total-value { color: var(--text); }

  .recargo-badge {
    background: #fff3e0;
    border: 1px solid #ffcc02;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: #e65100;
    font-weight: 600;
    margin-bottom: 12px;
    display: none;
  }
  .recargo-badge.show { display: block; }

  .no-items-msg {
    text-align: center;
    color: var(--text2);
    font-size: 14px;
    padding: 16px 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #222;
    color: white;
    padding: 12px 22px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Custom price input */
  .custom-price-row {
    margin-top: 8px;
    display: none;
  }
  .custom-price-row.show { display: block; }
  .custom-price-row input { background: #fffde7; border-color: var(--yellow-border); }

  select option { font-size: 15px; }
</style>
</head>

<div class="container">

  <!-- CLIENTE -->
  <div class="card">
    <div class="card-title"><span>👤</span> Datos del cliente</div>
    <div class="field">
      <label>Nombre / Razón social</label>
      <div class="search-wrap cli-search-wrap" style="position:relative">
        <span class="search-icon">👤</span>
        <input type="text" id="cli-nombre" placeholder="Buscá o escribí el nombre..." autocomplete="off" oninput="buscarCliente()" style="padding-left:36px">
        <div class="dropdown" id="cli-dropdown"></div>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>CUIT</label>
        <input type="text" id="cli-cuit" placeholder="30-00000000-0">
      </div>
      <div class="field">
        <label>Sit. IVA</label>
        <select id="cli-iva">
          <option>Responsable Inscripto</option>
          <option>Consumidor Final</option>
          <option>Monotributista</option>
          <option>Exento</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Dirección</label>
      <input type="text" id="cli-dir" placeholder="Calle y número">
    </div>
    <div class="field">
      <label>Localidad</label>
      <input type="text" id="cli-loc" placeholder="Ciudad - Provincia">
    </div>
    <button class="btn" onclick="guardarClienteActual()" style="background:#e8f2fb;color:#1a6dad;border:1.5px solid #1a6dad;width:100%;margin-top:4px;font-size:14px;padding:10px;">
      💾 Guardar cliente
    </button>
  </div>

  <!-- CONFIGURACIÓN -->
  <div class="card">
    <div class="card-title"><span>⚙️</span> Configuración</div>
    <div class="row2">
      <div class="field">
        <label>Tipo de cambio (U$S)</label>
        <input type="number" id="tc" value="1490" min="1">
      </div>
      <div class="field">
        <label>N° Cotización</label>
        <input type="text" id="nro-cot" placeholder="0001-00000897">
      </div>
    </div>
    <div class="field">
      <label>Condición de pago</label>
      <select id="cond-pago" onchange="toggleRecargo()">
        <option value="contado">Contado</option>
        <option value="echeq">0-30-60 días con echeq (+5%)</option>
      </select>
    </div>
  </div>

  <!-- AGREGAR PRODUCTOS -->
  <div class="card">
    <div class="card-title"><span>🔍</span> Agregar producto</div>

    <div class="field">
      <label>Buscar por código o nombre</label>
      <div class="search-wrap">
        <span class="search-icon">🔎</span>
        <input type="text" id="buscar" placeholder="Ej: FLE347, patch cord, cruz..." autocomplete="off" oninput="buscarProducto()" onkeydown="navDropdown(event)">
        <div class="dropdown" id="dropdown"></div>
      </div>
    </div>

    <div class="selected-product" id="selected-product">
      <div class="sp-code" id="sp-code"></div>
      <div class="sp-desc" id="sp-desc"></div>
      <div class="sp-price" id="sp-price"></div>
    </div>

    <div class="custom-price-row" id="custom-price-row">
      <label>Precio especial (U$S, sin IVA)</label>
      <input type="number" id="custom-price" placeholder="Dejar vacío para usar precio de lista" step="0.01" min="0">
    </div>

    <div class="add-row">
      <div class="field" style="margin-bottom:0">
        <label>Cantidad</label>
        <input type="number" id="cantidad" value="1" min="1" placeholder="1">
      </div>
      <div>
        <label>&nbsp;</label>
        <button class="btn btn-add" onclick="agregarItem()">＋ Agregar</button>
      </div>
    </div>

    <!-- Separador -->
    <div style="text-align:center;margin:14px 0 10px;color:#aaa;font-size:12px;">
      ── o bien, ingresá un ítem libre ──
    </div>

    <!-- Ítem manual -->
    <div style="background:var(--gray);border-radius:10px;padding:14px;border:1.5px dashed #ccc;">
      <div class="field" style="margin-bottom:10px">
        <label>Descripción libre</label>
        <input type="text" id="manual-desc" placeholder="Ej: Mano de obra, flete, etc.">
      </div>
      <div class="row3">
        <div class="field" style="margin-bottom:0">
          <label>Precio (U$S)</label>
          <input type="number" id="manual-precio" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="field" style="margin-bottom:0">
          <label>IVA %</label>
          <select id="manual-iva">
            <option value="21">21%</option>
            <option value="10.5">10,5%</option>
            <option value="0">0%</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Cant.</label>

// ===================== ESTADO =====================
let items = [];
let selectedProduct = null;
let dropdownIndex = -1;

// ===================== BÚSQUEDA =====================
function buscarProducto() {
  const q = document.getElementById('buscar').value.trim().toLowerCase();
  const dd = document.getElementById('dropdown');
  dropdownIndex = -1;
  if (q.length < 1) { dd.classList.remove('open'); return; }
  const results = productos.filter(p =>
    p.cod.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q)
  ).slice(0, 10);
  if (results.length === 0) { dd.innerHTML = '<div class="dropdown-item"><div class="item-desc">Sin resultados</div></div>'; dd.classList.add('open'); return; }
  dd.innerHTML = results.map((p, i) => `
    <div class="dropdown-item" onclick="seleccionarProducto('${p.cod}')" data-idx="${i}">
      <div class="item-code">${p.cod} · ${p.cat}</div>
      <div class="item-desc">${p.desc}</div>
      <div class="item-price">U$S ${p.precio.toFixed(2)} + IVA ${p.iva}%</div>
    </div>
  `).join('');
  dd.classList.add('open');
}

function navDropdown(e) {
  const dd = document.getElementById('dropdown');
  const items = dd.querySelectorAll('.dropdown-item');
  if (!dd.classList.contains('open') || items.length === 0) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); dropdownIndex = Math.min(dropdownIndex+1, items.length-1); highlightDD(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); dropdownIndex = Math.max(dropdownIndex-1, 0); highlightDD(items); }
  else if (e.key === 'Enter' && dropdownIndex >= 0) { e.preventDefault(); items[dropdownIndex].click(); }
  else if (e.key === 'Escape') { dd.classList.remove('open'); }
}
function highlightDD(items) {
  items.forEach((el,i) => el.classList.toggle('active', i === dropdownIndex));
  if (dropdownIndex >= 0) items[dropdownIndex].scrollIntoView({block:'nearest'});
}

function seleccionarProducto(cod) {
  selectedProduct = productos.find(p => p.cod === cod);
  document.getElementById('dropdown').classList.remove('open');
  document.getElementById('buscar').value = selectedProduct.cod + ' — ' + selectedProduct.desc;
  const sp = document.getElementById('selected-product');
  sp.classList.add('show');
  document.getElementById('sp-code').textContent = selectedProduct.cod + ' · ' + selectedProduct.cat;
  document.getElementById('sp-desc').textContent = selectedProduct.desc;
  document.getElementById('sp-price').textContent = `U$S ${selectedProduct.precio.toFixed(2)} + IVA ${selectedProduct.iva}%`;
  document.getElementById('custom-price-row').classList.add('show');
  document.getElementById('custom-price').value = '';
  document.getElementById('cantidad').focus();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) document.getElementById('dropdown').classList.remove('open');
});

// ===================== ÍTEM MANUAL =====================
function agregarItemManual() {
  const desc   = document.getElementById('manual-desc').value.trim();
  const precio = parseFloat(document.getElementById('manual-precio').value);
  const iva    = parseFloat(document.getElementById('manual-iva').value);
  const cant   = parseFloat(document.getElementById('manual-cant').value);

  if (!desc)            { showToast('Escribí una descripción'); return; }
  if (!precio || precio <= 0) { showToast('Ingresá un precio válido'); return; }
  if (!cant || cant <= 0)     { showToast('Ingresá una cantidad válida'); return; }

  items.push({
    cod: '—',
    desc,
    cant,
    precio,
    precioLabel: `U$S ${precio.toFixed(2)}`,
    iva,
    cat: 'Manual',
  });

  // Reset
  document.getElementById('manual-desc').value = '';
  document.getElementById('manual-precio').value = '';
  document.getElementById('manual-cant').value = '1';
  document.getElementById('manual-iva').value = '21';

  renderItems();
  renderTotales();
  showToast('Ítem agregado ✓');
}

// ===================== AGREGAR ITEM =====================
function agregarItem() {
  if (!selectedProduct) { showToast('Seleccioná un producto primero'); return; }
  const cant = parseFloat(document.getElementById('cantidad').value);
  if (!cant || cant <= 0) { showToast('Ingresá una cantidad válida'); return; }
  const customP = parseFloat(document.getElementById('custom-price').value);
  const precio = (!isNaN(customP) && customP > 0) ? customP : selectedProduct.precio;
  const precioLabel = (!isNaN(customP) && customP > 0) ? `U$S ${customP.toFixed(2)} ★` : `U$S ${selectedProduct.precio.toFixed(2)}`;

  items.push({
    cod: selectedProduct.cod,
    desc: selectedProduct.desc,
    cant,
    precio,
    precioLabel,
    iva: selectedProduct.iva,
    cat: selectedProduct.cat,
  });

  // Reset
  selectedProduct = null;
  document.getElementById('buscar').value = '';
  document.getElementById('cantidad').value = '1';
  document.getElementById('custom-price').value = '';
  document.getElementById('selected-product').classList.remove('show');
  document.getElementById('custom-price-row').classList.remove('show');

  renderItems();
  renderTotales();
  showToast('Producto agregado ✓');
}

function eliminarItem(idx) {
  items.splice(idx, 1);
  renderItems();
  renderTotales();
}

// ===================== RENDER =====================

  const el = document.getElementById('items-list');
  if (items.length === 0) {
    el.innerHTML = '<div class="empty-items"><span class="emoji">📦</span>Todavía no agregaste productos</div>';
    return;
  }
  const tc = parseFloat(document.getElementById('tc').value) || 1490;
  const echeq = document.getElementById('cond-pago').value === 'echeq';
  el.innerHTML = items.map((it, i) => {
    const mult = echeq ? 1.05 : 1;
    const totalUSD = it.cant * it.precio * (1 + it.iva/100) * mult;
    return `
    <div class="item-card">
      <div class="item-header">
        <div>
          <div class="item-code">${it.cod} · ${it.cat}</div>
          <div class="item-desc">${it.desc}</div>
        </div>
        <button class="btn btn-danger" onclick="eliminarItem(${i})">✕</button>
      </div>
      <div class="item-footer">
        <div class="item-detail">${it.cant} × ${it.precioLabel} + IVA ${it.iva}%</div>
        <div class="item-total">U$S ${totalUSD.toFixed(2)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderTotales() {
  const el = document.getElementById('totals-box');
  if (items.length === 0) { el.innerHTML = '<div class="no-items-msg">Agregá productos para ver los totales</div>'; return; }
  const tc = parseFloat(document.getElementById('tc').value) || 1490;
  const echeq = document.getElementById('cond-pago').value === 'echeq';
  const mult = echeq ? 1.05 : 1;

  let neto = 0, iva21 = 0, iva105 = 0;
  items.forEach(it => {
    const sub = it.cant * it.precio * mult;
    neto += sub;
    if (it.iva === 21)   iva21  += sub * 0.21;
    else                 iva105 += sub * 0.105;
  });
  const total = neto + iva21 + iva105;

  el.innerHTML = `
    <div class="total-row"><span class="total-label">Importe neto</span><span class="total-value">U$S ${neto.toFixed(2)}</span></div>
    ${iva21 > 0 ? `<div class="total-row"><span class="total-label">IVA 21%</span><span class="total-value">U$S ${iva21.toFixed(2)}</span></div>` : ''}
    ${iva105 > 0 ? `<div class="total-row"><span class="total-label">IVA 10,5%</span><span class="total-value">U$S ${iva105.toFixed(2)}</span></div>` : ''}
    <div class="total-row highlight"><span class="total-label">TOTAL U$S</span><span class="total-value">U$S ${total.toFixed(2)}</span></div>
    <div class="total-row highlight"><span class="total-label">TOTAL $</span><span class="total-value">$ ${(total*tc).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2})}</span></div>
  `;
}

function toggleRecargo() {
  const echeq = document.getElementById('cond-pago').value === 'echeq';
  document.getElementById('recargo-badge').classList.toggle('show', echeq);
  renderItems();
  renderTotales();
}

// Actualizar al cambiar TC
document.getElementById('tc').addEventListener('input', () => { renderItems(); renderTotales(); });

// ===================== TOAST =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function getClientesStorage() {
  try {
    const data = localStorage.getItem('conectorizar_clientes');
    const saved = data ? JSON.parse(data) : [];
    // Merge: preloaded + saved (saved takes priority if same nombre)
    const merged = [...CLIENTES_PRELOADED];
    saved.forEach(s => {
      const idx = merged.findIndex(m => m.nombre.toLowerCase() === s.nombre.toLowerCase());
      if (idx >= 0) merged[idx] = s;
      else merged.push(s);
    });
    return merged.sort((a,b) => a.nombre.localeCompare(b.nombre));
  } catch(e) { return CLIENTES_PRELOADED; }
}

function saveClienteStorage(cliente) {
  try {
    const data = localStorage.getItem('conectorizar_clientes');
    const saved = data ? JSON.parse(data) : [];
    const idx = saved.findIndex(c => c.nombre.toLowerCase() === cliente.nombre.toLowerCase());
    if (idx >= 0) saved[idx] = cliente;
    else saved.push(cliente);
    localStorage.setItem('conectorizar_clientes', JSON.stringify(saved));
  } catch(e) {}
}

function buscarCliente() {
  const q = document.getElementById('cli-nombre').value.trim().toLowerCase();
  const dd = document.getElementById('cli-dropdown');
  if (q.length < 1) { dd.classList.remove('open'); return; }
  const clientes = getClientesStorage();
  const results = clientes.filter(c => c.nombre.toLowerCase().includes(q)).slice(0, 8);
  if (results.length === 0) { dd.classList.remove('open'); return; }
  dd.innerHTML = results.map((c, i) => `
    <div class="dropdown-item" onclick="seleccionarCliente(${i})">
      <div class="item-code">${c.nombre}</div>
      <div class="item-desc">${c.cuit ? 'CUIT: ' + c.cuit + ' · ' : ''}${c.loc}</div>
    </div>
  `).join('');
  // Store results temporarily
  dd._results = results;
  dd.classList.add('open');
}

function seleccionarCliente(idx) {
  const dd = document.getElementById('cli-dropdown');
  const c = dd._results[idx];
  document.getElementById('cli-nombre').value = c.nombre;
  document.getElementById('cli-cuit').value = c.cuit || '';
  document.getElementById('cli-iva').value = c.iva || 'Responsable Inscripto';
  document.getElementById('cli-dir').value = c.dir || '';
  document.getElementById('cli-loc').value = c.loc || '';
  dd.classList.remove('open');
  showToast('Cliente cargado ✓');
}

function guardarClienteActual() {
  const nombre = document.getElementById('cli-nombre').value.trim();
  if (!nombre) { showToast('Ingresá el nombre del cliente primero'); return; }
  const c = {
    nombre,
    cuit: document.getElementById('cli-cuit').value.trim(),
    iva:  document.getElementById('cli-iva').value,
    dir:  document.getElementById('cli-dir').value.trim(),
    loc:  document.getElementById('cli-loc').value.trim(),
  };
  saveClienteStorage(c);
  showToast('Cliente guardado ✓');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.cli-search-wrap')) {
    const dd = document.getElementById('cli-dropdown');
    if (dd) dd.classList.remove('open');
  }
});
